<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sun/Solar Element with Sensing Rays -->
  <circle cx="100" cy="100" r="35" fill="#c4a35a" opacity="0.2"/>
  <circle cx="100" cy="100" r="25" fill="#e2c887"/>
  
  <!-- Sensing Rays (8 directional) -->
  <g stroke="#c4a35a" stroke-width="3" stroke-linecap="round">
    <!-- Top -->
    <line x1="100" y1="40" x2="100" y2="55" opacity="0.8"/>
    <line x1="100" y1="145" x2="100" y2="160" opacity="0.8"/>
    <!-- Right -->
    <line x1="160" y1="100" x2="145" y2="100" opacity="0.8"/>
    <line x1="55" y1="100" x2="40" y2="100" opacity="0.8"/>
    <!-- Diagonals -->
    <line x1="135" y1="65" x2="145.5" y2="54.5" opacity="0.6"/>
    <line x1="54.5" y1="145.5" x2="65" y2="135" opacity="0.6"/>
    <line x1="145.5" y1="145.5" x2="135" y2="135" opacity="0.6"/>
    <line x1="65" y1="65" x2="54.5" y2="54.5" opacity="0.6"/>
  </g>
  
  <!-- Data Points/Sensing Nodes -->
  <circle cx="100" cy="45" r="3" fill="#e2c887"/>
  <circle cx="100" cy="155" r="3" fill="#e2c887"/>
  <circle cx="155" cy="100" r="3" fill="#e2c887"/>
  <circle cx="45" cy="100" r="3" fill="#e2c887"/>
  <circle cx="141" cy="59" r="2.5" fill="#c4a35a" opacity="0.7"/>
  <circle cx="59" cy="141" r="2.5" fill="#c4a35a" opacity="0.7"/>
  <circle cx="141" cy="141" r="2.5" fill="#c4a35a" opacity="0.7"/>
  <circle cx="59" cy="59" r="2.5" fill="#c4a35a" opacity="0.7"/>
  
  <!-- Center Core (Technology) -->
  <circle cx="100" cy="100" r="12" fill="#9a7b3c"/>
  <circle cx="100" cy="100" r="8" fill="#0c0c0f" stroke="#c4a35a" stroke-width="1.5"/>
  
  <!-- Subtle Orbital Ring -->
  <circle cx="100" cy="100" r="45" stroke="#c4a35a" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 4"/>
</svg>
